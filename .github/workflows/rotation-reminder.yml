name: rotation-reminder

on:
  schedule:
    # 분기 시작일(1/1, 4/1, 7/1, 10/1) UTC 00:00 — 한국시간 09:00
    - cron: "0 0 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open rotation reminder issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          QUARTER=$(date -u +%Y-Q$((($(date -u +%-m)-1)/3+1)))
          gh issue create \
            --repo ${{ github.repository }} \
            --title "[$QUARTER] Deploy Key 분기 로테이션" \
            --body "docs/runbooks/deploy-key-rotation.md 의 절차에 따라 Deploy Key 를 교체하세요.\n\n체크리스트:\n- [ ] 신규 키 쌍 생성\n- [ ] 새 public 키 private 레포에 추가\n- [ ] 새 private 키 DEPLOY_KEY_INTERNAL secret 갱신\n- [ ] CI 수동 트리거로 검증\n- [ ] 구 키 삭제\n- [ ] Slack #security 기록" \
            --label "security,ops"
