repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        # .bat / .cmd 는 Windows 표준 CRLF — LF 강제 시 cmd.exe 가
        # 깨진다. gradle wrapper 가 자동 생성하는 gradlew.bat 도 동일.
        exclude: '\.(bat|cmd)$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: '(^\.secrets\.baseline$|^ai/prompts/|^scripts/test-pre-commit-regression\.sh$)'

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend ESLint
        # frontend/ 안에서 전체 린트 — 한 파일만 검사하면 cross-file 룰 (no-unused-vars 등) 이 누락된다.
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|mjs|js)$
        pass_filenames: false
