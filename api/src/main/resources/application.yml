spring:
  application:
    name: laborcase-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/laborcase}
    username: ${DATABASE_USER:laborcase}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: Asia/Seoul
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    kr.laborcase: DEBUG
