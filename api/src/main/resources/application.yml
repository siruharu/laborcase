spring:
  application:
    name: laborcase-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/laborcase}
    username: ${DATABASE_USER:laborcase}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: Asia/Seoul
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

law:
  oc: ${LAW_OC:}

cors:
  # Single origin is enough for MVP (frontend dev = localhost:3000, prod = laborcase.kr).
  # If multiple origins are needed later, swap @CrossOrigin for a WebMvcConfigurer.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

laborcase:
  gcs:
    raw-bucket: ${LABORCASE_GCS_RAW_BUCKET:laborcase-raw}
  freshness:
    stale-threshold-hours: ${LABORCASE_STALE_HOURS:48}

sentry:
  # Empty DSN → starter becomes a no-op (safe for dev + tests).
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:dev}
  release: ${SENTRY_RELEASE:0.1.0-SNAPSHOT}
  # MVP: only capture ERRORs. Turn on tracing later when we have a perf budget.
  traces-sample-rate: 0.0
  logging:
    minimum-event-level: ERROR
    minimum-breadcrumb-level: INFO

logging:
  level:
    root: INFO
    kr.laborcase: DEBUG
